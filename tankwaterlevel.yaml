esphome:
  name: tankwaterlevel

substitutions:
  pin_trig: GPIO4
  pin_echo: GPIO5

web_server:
  port: 80
  include_internal: true

esp8266:
  board: d1_mini_lite
  framework:
    version: recommended

logger:
  level: DEBUG

wifi:
  networks:
    - ssid: !secret wifi_ssid_1
      password: !secret wifi_pass_1
    - ssid: !secret wifi_ssid_2
      password: !secret wifi_pass_2
    - ssid: !secret wifi_ssid_3
      password: !secret wifi_pass_3
      priority: 10
    - ssid: !secret wifi_ssid_4
      password: !secret wifi_pass_4
      priority: 10
  min_auth_mode: WPA2
  ap:
    ssid: "tankwaterlevel"
    password: "tankwaterlevel"

ota:
  - platform: esphome
    password: ""

captive_portal:

# ---- User configuration ----
number:
  - platform: template
    name: "Settings - Pipe length"
    id: cfg_pipe_length
    unit_of_measurement: "cm"
    min_value: 30
    max_value: 300
    step: 1
    initial_value: 100
    restore_value: true
    optimistic: true
    mode: box

  - platform: template
    name: "Settings - Max tank level"
    id: cfg_max_level
    unit_of_measurement: "cm"
    min_value: 10
    max_value: 300
    step: 1
    initial_value: 80
    restore_value: true
    optimistic: true
    mode: box

  - platform: template
    name: "Settings - Offset"
    id: cfg_offset
    unit_of_measurement: "cm"
    min_value: -20
    max_value: 20
    step: 0.5
    initial_value: 0
    restore_value: true
    optimistic: true
    mode: box

  - platform: template
    name: "Settings - Low level threshold"
    id: cfg_low_level
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 20
    restore_value: true
    optimistic: true
    mode: box

# ---- Sensors ----
sensor:
  - platform: ultrasonic
    trigger_pin: ${pin_trig}
    echo_pin: ${pin_echo}
    name: "Water level - distance"
    id: distance_m
    update_interval: 2s
    timeout: 3m
    pulse_time: 10us
    filters:
      - filter_out: nan
      - filter_out: 0.0
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 1
      - clamp:
          min_value: 0.22
          max_value: 2.00
          ignore_out_of_range: true

  - platform: template
    name: "Water level - height"
    id: water_height
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float dist = id(distance_m).state * 100.0;  // meters → cm
      if (isnan(dist) || dist <= 0) return NAN;
      float height = (id(cfg_pipe_length).state - dist) + id(cfg_offset).state;
      if (height < 0.0) return 0.0;
      if (height > id(cfg_max_level).state) return id(cfg_max_level).state;
      return height;

  - platform: template
    name: "Tank percentage"
    id: tank_percentage
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      float v = id(water_height).state;
      if (isnan(v)) return NAN;
      return (v / id(cfg_max_level).state) * 100.0;

binary_sensor:
  - platform: template
    name: "Low water level"
    device_class: problem
    lambda: |-
      float p = id(tank_percentage).state;
      if (isnan(p)) return false;
      return p < id(cfg_low_level).state;